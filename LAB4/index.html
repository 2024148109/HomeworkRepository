<!DOCTYPE HTML>

<html>
    <head>
        <title>Main</title>
        <link rel = "stylesheet" type="text/css" href = "main.css"></link>

    </head>

    <body>
        <div class="pagecontainer">
        
        <h3 class="headertext">인프밍 영화 정보 사이트입니다.</h3>

        <div class="navigation">
        <a class="mainpagelink" href = "index.html">메인페이지</a>
        <a class="linking" href = "login.html">로그인</a>
        <a class="linking" href = "signup.html">회원가입</a>
        </div>

        <!--borderline-->
        <hr>

        <form action="" method="GET" onsubmit="handleSearch(event)">
            <div class="input">
                <input type="text" id="searchInput" name="search" value="" class="form-search" placeholder = "키워드를 입력하세요">
                <button type="submit" class="buttonsearch">Filter results</button>

            </div>
        </form>




        <h3>Movies</h3>
        <!--borderline-->
        <hr class="thin">

        <div class="movies-layout">
            <!--filtering-->
            <div class="sorting">
                <p class="sort-title">정렬 기준</p>
                <label><input type="radio" name="sort" value="vote_desc" onchange="applySort()">평정 내림차순 </label>
                <label><input type="radio" name="sort" value="vote_asc" onchange="applySort()">평정 오름차순 </label>
                <label><input type="radio" name="sort" value="date_desc" onchange="applySort()">개봉 내림차순 </label>
                <label><input type="radio" name="sort" value="date_asc" onchange="applySort()">개봉 오름차순 </label>

            </div>

            <div class="moviegrid" id="grid"></div>

        </div>

        <div id="scroll-sentinel"></div>



    <script>
        let allMovies=[];
        let filteredMovies=[];
        let displayedCount=0;
        const PAGE_SIZE=4;




        fetch('product.json')
        .then(res => res.json())
        .then(movies=> {allMovies=movies;
                    filteredMovies=[...allMovies];
                    displayedCount=0;
                    loadMore();
                    observeScroll();
                });
        

        function createbox(m){
            const div = document.createElement('div');
            div.className='moviebox';
            div.innerHTML=`
                <div class="posterwrap">
                    <img src = "${m.poster_path}" alt="${m.title}">
                    <div class="overlay">
                        <p class="overlaylabel">줄거리: </p>
                        <p class="overlaytext">${m.overview}</p>
                    </div>
                </div>

                    <div class="movieinfor">
                        <p class="movietitle">${m.title}</p>
                        <div class="moviedata">
                            <div>📅 ${m.release_date}</div>
                            <div>💫 ${m.vote_average}/10 </div>
                        </div>
                    </div>
                `;
                return div;
                
        }


        function loadMore(){
            const grid= document.getElementById('grid');
            const next= filteredMovies.slice(displayedCount, displayedCount+PAGE_SIZE);
            next.forEach(m => grid.appendChild(createbox(m)));
            
            displayedCount += next.length;


        }
        


        function observeScroll(){
            const sentinel= document.getElementById('scroll-sentinel');
            const observer= new IntersectionObserver(entries => { 
                if(entries[0].isIntersecting && displayedCount < filteredMovies.length){loadMore();}
            
            }, {threshold: 0.2});
            
            observer.observe(sentinel);

        }



        function handleSearch(g){
            g.preventDefault();
            const keyword=document.getElementById('searchInput').value.trim().toLowerCase();
            filteredMovies=allMovies.filter(m=> m.title.toLowerCase().includes(keyword) || m.genres.some(e=> e.toLowerCase().includes(keyword)) || m.overview.toLowerCase().includes(keyword)  );

            applySort(false);

        }
        



    function applySort(keepSearch=true){
            if(keepSearch){const keyword=document.getElementById('searchInput').value.trim().toLowerCase();
                if(keyword){
                    filteredMovies=allMovies.filter(m=> m.title.toLowerCase().includes(keyword) || m.genres.some(e=> e.toLowerCase().includes(keyword)) || m.overview.toLowerCase().includes(keyword) );
                }  
                else{filteredMovies=[...allMovies];}
            }
        


        const sort=document.querySelector('input[name="sort"]:checked');


        if(sort){
            

            if(sort.value == 'vote_desc') {filteredMovies.sort((a,b) => b.vote_average - a.vote_average);}

            else if(sort.value == 'vote_asc') {filteredMovies.sort((a,b) => a.vote_average - b.vote_average);}
            else if(sort.value == 'date_desc') {filteredMovies.sort((a,b) => new Date(b.release_date) - new Date(a.release_date));}
            else if(sort.value == 'date_asc') {filteredMovies.sort((a,b) => new Date(a.release_date) - new Date(b.release_date));}

        }
        
        const grid = document.getElementById('grid');
        grid.innerHTML='';
        displayedCount=0;
        loadMore();
    }      
        
    </script>


      
    </body>


</html>

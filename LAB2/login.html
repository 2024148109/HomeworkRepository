    <form>

        </div>

        <div class="inputs">

            <input type = "password" required name = "password" placeholder="비밀번호 입력" ></input>
        </div>
        

            <div class="button-align">
        <button type="submit" class="button login">Login</button>
        <button class="button cancel" type="button">Cancel</button>
            </div>
    
    </div>
    </form>

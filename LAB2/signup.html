<!DOCTYPE html>

<html>
    <head>
        <title>SignUp</title>
        <link rel="stylesheet" type="text/css" href="main.css"></link>
        

    </head>

    <body>
        <h2>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h2>
        <p><a href = "login.html">로그인</a> | <a class="signup-style" href = "signup.html">회원가입</a></p>

    <form autocomplete ="on">

    <div class="signup-box"> 


        <div class="inputs">
        <label>이름:</label> <input name="name" type= "text" required autocomplete="off" autofocus></input>
        </div>

        <div class="inputs">
        <label>생일:</label> <input name="date" type= "date" required></input>
        </div>

        <div class="inputs" required>
        <label>성별:</label><input name="gender" id="man" type= "radio" required>남성</input>
                            <input name="gender" id="woman" type= "radio" required>여성</input>
        </div>

        <div class="inputs">
        <label>학년:</label><input name="class" type= "number" min="1" max="4" step="1" required></input>
        </div>

        <div class="inputs">
        <label>아이디:</label> <input name="id" type= "text" required ></input>
        </div>

        <div class="inputs">
        <label>비밀번호:</label><input name="password" type= "password" required></input>
        </div>

        <div class="inputs">
        <label>이메일:</label><input name="mail" type= "email" required></input>
        </div>

        <div class="inputs">
        <label>보안 질문:</label>
        <select id="question" required>
            <option value="" disabled selected>질문을 선택하세요</optin>
            <option value="animal">좋아하는 동물이 무엇인가요?</option>
            <option value="food">좋아하는 음식이 무엇인가요?</option>
            <option value="color">좋아하는 색이 무엇인가요?</option>
        </select>
        </div>

        <div class="inputs">
        <label>답변:</label><input name="answer" type= "text" required></input>
        </div>

        <div class="button-align">
        <button type="submit" class="button login">Signup</button>
        <button class="button cancel" type="submit">Cancel</button>
        </div>

    </div>    
    </form>
    </body>

        

</html>
